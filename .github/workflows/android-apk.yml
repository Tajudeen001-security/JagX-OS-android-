name: Build Android APK

# Builds JagX OS into an installable Android APK.
# - Runs automatically on every push to main and on pull requests.
# - Can also be triggered manually from the Actions tab ("Run workflow").
# The finished APK is attached to the workflow run under "Artifacts" —
# no signing/Play Store account needed, this produces a debug-signed APK
# that installs directly on a device via "Install unknown apps".
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install web dependencies
        run: bun install

      - name: Build web app (dist/)
        run: bun run build

      - name: Generate Capacitor Android project
        run: |
          if [ ! -d "android" ]; then
            bunx cap add android
          else
            bunx cap sync android
          fi

      - name: Apply JagX OS Android overrides (HOME launcher manifest, edge-to-edge activity)
        run: |
          cp -a android-overrides/app/. android/app/

      - name: Sync web assets into the Android project
        run: bunx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Assemble debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jagx-os-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
